<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bus.aolabs.io</title>
    <meta name="description" content="Minimal WRTA live tracker for routes 2, 4, 3, and 31.">
    <link rel="canonical" href="https://bus.aolabs.io/">
    <meta property="og:title" content="bus.aolabs.io">
    <meta property="og:description" content="Routes 2, 4, 3, and 31 with live buses and fixed location pins.">
    <meta property="og:url" content="https://bus.aolabs.io/">
    <meta property="og:type" content="website">
    <link rel="icon" href="https://aolabs.io/favicon.svg?v=20260516-suite-bloom" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-bloom">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://aolabs.io/suite-header.css?v=20260516-suite-bloom">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/styles.css?v=20260517-map-controls1">
  </head>
  <body>
    <header class="suite-topbar" aria-label="bus navigation">
      <div class="suite-brand-cluster">
        <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
          <img src="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-bloom" alt="">
        </a>
        <a class="suite-app-brand" href="/" aria-label="bus home">
          <img class="suite-app-mark" src="https://aolabs.io/icons/bus.svg?v=20260516-bus-polish2" alt="">
          <span class="suite-app-name">bus.aolabs.io</span>
        </a>
      </div>
      <div class="suite-topbar-actions" aria-label="bus actions">
        <a href="https://swiv.wrta.cadavl.com/SWIV/WRTA" target="_blank" rel="noreferrer">wrta source</a>
      </div>
    </header>

    <header class="paper-strip" aria-label="bus paper">
      <div class="paper-copy">
        <span>Paper</span>
        <strong>A source-bounded transit interface for reducing cognitive load in local bus use</strong>
        <p>WRTA route timing, stop choice, bus position, and destination arrival boundary.</p>
      </div>
      <div class="paper-actions">
        <a class="paper-button primary" href="/paper.pdf" download>Open PDF</a>
      </div>
    </header>

    <main class="tracker">
      <section class="map-panel" aria-label="WRTA live map">
        <div class="map-toolbar">
          <span id="statusText">Loading</span>
          <div class="gps-control">
            <button id="gpsButton" type="button">Use GPS</button>
            <span id="gpsHint" class="gps-hint" hidden></span>
          </div>
        </div>
        <div id="map" aria-label="Routes 2, 4, 3, and 31"></div>
      </section>

      <aside class="side-panel" aria-label="Tracker state">
        <section class="panel-section selected-panel">
          <p class="eyebrow">Selected trip</p>
          <strong id="selectedStopName">Select a location</strong>
          <span id="selectedStopDetail">--</span>
          <div id="arrivalList" class="arrival-list"></div>
        </section>

        <section class="panel-section destination-panel">
          <p class="eyebrow">Destination</p>
          <div id="locationList" class="location-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Trip options</p>
          <div id="optionList" class="option-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Live buses</p>
          <div id="busList" class="bus-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Updated</p>
          <strong id="updatedAt">--</strong>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
