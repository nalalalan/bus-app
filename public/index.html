<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WRTA Bus Tracker | bus.aolabs.io</title>
    <meta name="description" content="Minimal WRTA live tracker for routes 2, 4, 3, and 31.">
    <link rel="canonical" href="https://bus.aolabs.io/">
    <meta property="og:title" content="WRTA bus tracker">
    <meta property="og:description" content="Routes 2, 4, 3, and 31 with live buses and fixed location pins.">
    <meta property="og:url" content="https://bus.aolabs.io/">
    <meta property="og:type" content="website">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="ao-link" href="https://aolabs.io/" aria-label="AO Labs">
        <span class="ao-mark" aria-hidden="true">AO</span>
      </a>
      <div>
        <p class="eyebrow">bus.aolabs.io</p>
        <h1>WRTA bus tracker</h1>
      </div>
      <a class="source-link" href="https://swiv.wrta.cadavl.com/SWIV/WRTA" target="_blank" rel="noreferrer">WRTA source</a>
    </header>

    <main class="tracker">
      <section class="map-panel" aria-label="WRTA live map">
        <div class="map-toolbar">
          <span id="statusText">Loading</span>
        </div>
        <div id="map" aria-label="Routes 2, 4, 3, and 31"></div>
      </section>

      <aside class="side-panel" aria-label="Tracker state">
        <section class="panel-section">
          <p class="eyebrow">Locations</p>
          <div id="locationList" class="location-list"></div>
        </section>

        <section class="panel-section selected-panel">
          <p class="eyebrow">Closest stop</p>
          <strong id="selectedStopName">Select a location</strong>
          <span id="selectedStopDetail">--</span>
          <div id="arrivalList" class="arrival-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Routes</p>
          <div id="routeList" class="route-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Live buses</p>
          <div id="busList" class="bus-list"></div>
        </section>

        <section class="panel-section">
          <p class="eyebrow">Updated</p>
          <strong id="updatedAt">--</strong>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
